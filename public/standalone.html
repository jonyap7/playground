<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>WhatsBiz GIG</title>
<style>
:root{
    --bg:#0b1220; --app:#0f172a; --card:#1e293b; --card2:#273449; --line:#334155;
    --text:#e8edf5; --muted:#94a3b8; --brand:#16a34a; --brand2:#22c55e; --accent:#f59e0b;
    --hot:#ef4444; --good:#22c55e; --mid:#eab308; --bad:#ef4444; --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:#020617;color:var(--text);
    display:flex;justify-content:center;}
  .phone{width:100%;max-width:460px;background:var(--app);min-height:100vh;display:flex;flex-direction:column;position:relative;box-shadow:0 0 60px rgba(0,0,0,.5);}
  /* header */
  header{background:linear-gradient(120deg,var(--brand),#15803d);padding:14px 16px 12px;position:sticky;top:0;z-index:5;}
  .hrow{display:flex;align-items:center;gap:10px;}
  .brand{font-weight:800;font-size:1.25rem;letter-spacing:-.3px;}
  .brand small{font-weight:600;opacity:.9;background:rgba(255,255,255,.2);padding:2px 7px;border-radius:6px;font-size:.6rem;vertical-align:middle;margin-left:4px;}
  .tagline{font-size:.78rem;color:rgba(255,255,255,.9);margin-top:2px;}
  .lang{margin-left:auto;background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:9px;padding:6px 8px;font-size:.82rem;font-weight:600;}
  .lang option{color:#111;}
  .roles{display:flex;gap:6px;margin-top:12px;background:rgba(0,0,0,.18);padding:4px;border-radius:12px;}
  .roles button{flex:1;border:none;background:transparent;color:rgba(255,255,255,.8);font-weight:700;padding:9px;border-radius:9px;cursor:pointer;font-size:.92rem;}
  .roles button.on{background:#fff;color:#15803d;}
  /* content */
  main{flex:1;overflow-y:auto;padding:14px 14px 90px;}
  .bn{position:sticky;bottom:0;display:flex;background:var(--card);border-top:1px solid var(--line);}
  .bn button{flex:1;background:none;border:none;color:var(--muted);padding:10px 4px 12px;font-size:.7rem;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .bn button .ic{font-size:1.25rem;}
  .bn button.on{color:var(--brand2);}
  /* generic */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
  .muted{color:var(--muted);} .sm{font-size:.82rem;} .xs{font-size:.74rem;}
  h2{margin:2px 0 12px;font-size:1.15rem;} h3{margin:0 0 8px;font-size:.95rem;}
  label{display:block;font-size:.82rem;color:var(--muted);font-weight:600;margin:11px 0 5px;}
  input,select,textarea{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--text);
    padding:12px;border-radius:11px;font-size:1rem;font-family:inherit;}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--brand2);border-color:var(--brand2);}
  .row{display:flex;gap:9px;} .row>*{flex:1;}
  .btn{width:100%;border:none;border-radius:12px;padding:13px;font-weight:800;font-size:1rem;cursor:pointer;background:var(--brand);color:#fff;}
  .btn:active{transform:scale(.99);}
  .btn.alt{background:var(--card2);color:var(--text);border:1px solid var(--line);}
  .btn.amber{background:var(--accent);color:#111;}
  .btn.red{background:transparent;color:var(--bad);border:1px solid rgba(239,68,68,.4);}
  .btn.sm{padding:9px;font-size:.85rem;border-radius:10px;width:auto;}
  .ghost{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:9px;padding:7px 11px;font-size:.8rem;font-weight:600;cursor:pointer;}
  .pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:.72rem;font-weight:700;}
  .pill.hot{background:rgba(239,68,68,.18);color:#fca5a5;}
  .pill.amber{background:rgba(245,158,11,.18);color:#fcd34d;}
  .pill.green{background:rgba(34,197,94,.18);color:#86efac;}
  .pill.blue{background:rgba(99,102,241,.18);color:#c4b5fd;}
  .pill.gray{background:var(--card2);color:var(--muted);}
  .verified{color:#38bdf8;font-weight:700;}
  /* job card */
  .job .jt{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;}
  .job .name{font-weight:800;font-size:1.08rem;line-height:1.2;}
  .job .pay{font-weight:900;color:var(--brand2);font-size:1.15rem;white-space:nowrap;}
  .job .meta{display:flex;flex-wrap:wrap;gap:6px 14px;margin:10px 0;color:var(--muted);font-size:.85rem;}
  .job .emp{display:flex;align-items:center;gap:6px;font-size:.84rem;color:var(--muted);margin-bottom:4px;}
  .spots{font-size:.8rem;}
  .filters{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;margin-bottom:4px;}
  .filters button{white-space:nowrap;background:var(--card);border:1px solid var(--line);color:var(--muted);
    border-radius:999px;padding:7px 13px;font-size:.82rem;font-weight:600;cursor:pointer;}
  .filters button.on{background:var(--brand);border-color:var(--brand);color:#fff;}
  /* reliability */
  .rel{display:inline-flex;align-items:center;gap:5px;font-weight:800;font-size:.85rem;}
  .rel.g{color:var(--good);} .rel.m{color:var(--mid);} .rel.b{color:var(--bad);}
  .avatar{width:46px;height:46px;border-radius:50%;background:var(--card2);display:grid;place-items:center;font-size:1.6rem;flex:none;}
  .applicant{display:flex;gap:11px;align-items:center;padding:11px 0;border-top:1px solid var(--line);}
  .applicant:first-child{border-top:none;}
  .empty{text-align:center;color:var(--muted);padding:36px 16px;border:1px dashed var(--line);border-radius:14px;}
  .stat{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:.92rem;}
  .stat:last-child{border-bottom:none;}
  .stars{font-size:1.3rem;letter-spacing:2px;cursor:pointer;}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:20;}
  .sheet{background:var(--app);width:100%;max-width:460px;border-radius:20px 20px 0 0;padding:18px 16px 24px;max-height:85vh;overflow:auto;border-top:1px solid var(--line);}
  .sheet h3{font-size:1.1rem;margin-bottom:4px;}
  .grab{width:40px;height:4px;background:var(--line);border-radius:99px;margin:0 auto 12px;}
  /* chat */
  .msgs{display:flex;flex-direction:column;gap:8px;margin:12px 0;min-height:120px;max-height:46vh;overflow:auto;padding:4px;}
  .bub{max-width:78%;padding:9px 12px;border-radius:14px;font-size:.9rem;line-height:1.35;}
  .bub.me{align-self:flex-end;background:var(--brand);color:#fff;border-bottom-right-radius:4px;}
  .bub.them{align-self:flex-start;background:var(--card2);border-bottom-left-radius:4px;}
  .bub .who{font-size:.66rem;opacity:.7;margin-bottom:1px;}
  .chatform{display:flex;gap:8px;}
  .chatform input{flex:1;}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#111827;border:1px solid var(--line);color:#fff;padding:11px 16px;border-radius:12px;font-size:.88rem;z-index:40;box-shadow:0 8px 24px rgba(0,0,0,.4);}

  /* --- notifications bell --- */
  .bell{position:relative;margin-left:auto;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);
    color:#fff;border-radius:9px;padding:6px 9px;font-size:1.05rem;line-height:1;cursor:pointer;}
  .bdot{position:absolute;top:-5px;right:-5px;background:var(--hot);color:#fff;font-size:.62rem;font-weight:800;
    min-width:17px;height:17px;border-radius:99px;display:grid;place-items:center;padding:0 4px;border:1px solid var(--app);}
  .hrow .lang{margin-left:8px;}
  .noti{padding:10px 12px;border-radius:10px;background:var(--card2);margin-bottom:8px;border-left:3px solid transparent;font-size:.9rem;}
  .noti.unread{border-left-color:var(--brand2);background:rgba(34,197,94,.08);}
  /* --- featured jobs --- */
  .card.feat{border-color:var(--accent);box-shadow:0 0 0 1px rgba(245,158,11,.35);overflow:hidden;}
  .featbar{margin:-14px -14px 10px;padding:5px 14px;font-weight:800;font-size:.72rem;color:#1a1205;
    background:linear-gradient(90deg,#fbbf24,#f59e0b);}
  .pill.gold{background:rgba(245,158,11,.18);color:#fcd34d;}
  /* --- plan tiers --- */
  .tier{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid var(--line);}
  .tier:first-of-type{border-top:none;}
  .tier.on{opacity:1;}
  .check{display:flex;align-items:center;gap:9px;margin-top:12px;color:var(--text);font-size:.92rem;cursor:pointer;font-weight:600;}
  .check input{width:auto;}

  /* --- WhatsApp share button --- */
  .btn.wa{background:#25d366;color:#053b22;font-weight:800;}
  .btn.wa:not(.full){width:auto;padding:13px 14px;flex:none;}
  .btn.wa.full{width:100%;}

  /* --- search + categories --- */
  .searchwrap{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:0 12px;margin-bottom:10px;}
  .searchwrap span{opacity:.6;}
  .search{border:none;background:transparent;padding:11px 0;font-size:.95rem;}
  .search:focus{outline:none;}
  .filters.cats{margin-bottom:8px;}
  .pill.cat{background:rgba(99,102,241,.16);color:#c4b5fd;border:1px solid rgba(99,102,241,.3);}

  /* --- bookmark --- */
  .bm{margin-left:auto;background:transparent;border:none;cursor:pointer;font-size:1.05rem;line-height:1;padding:2px 4px;filter:grayscale(.2);}
  .bm.on{filter:none;}
  /* --- segmented list/map toggle --- */
  .seg{display:flex;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:10px;}
  .seg button{flex:1;border:none;background:transparent;color:var(--muted);font-weight:700;padding:9px;border-radius:9px;cursor:pointer;font-size:.9rem;}
  .seg button.on{background:var(--brand);color:#fff;}
  /* --- map --- */
  .mapcard{padding:10px;}
  .map{width:100%;height:auto;display:block;background:radial-gradient(circle at 50% 50%, #15233b, #0d1726);border-radius:12px;}
  .map .ring{fill:none;stroke:#3a4d6b;stroke-dasharray:4 4;}
  .map .ringlbl{fill:#64748b;font-size:9px;text-anchor:middle;}
  .map .mehere{fill:#38bdf8;stroke:#fff;stroke-width:2;}
  .map .melbl{fill:#e2e8f0;font-size:10px;font-weight:700;}
  .map .pin{cursor:pointer;}
  .map .pindot{fill:#16a34a;stroke:#0d1726;stroke-width:2;}
  .map .pindot.urg{fill:#ef4444;}
  .map .pindot.feat{fill:#f59e0b;}
  .map .pinemo{font-size:14px;}
  .map .pinlbl{fill:#cbd5e1;font-size:9px;font-weight:700;}
</style>
</head>

// xy = simple grid for the demo; ll = real lat/lng used when live GPS is on.
const TOWNS = {
  georgetown:{n:"Georgetown",xy:[5,18],ll:[5.4141,100.3288]}, tanjung:{n:"Tanjung Tokong",xy:[4,21],ll:[5.4631,100.2840]},
  gelugor:{n:"Gelugor",xy:[5,13],ll:[5.3593,100.3010]}, bayanlepas:{n:"Bayan Lepas",xy:[4,5],ll:[5.2945,100.2640]},
  butterworth:{n:"Butterworth",xy:[12,17],ll:[5.3991,100.3638]}, bukitmertajam:{n:"Bukit Mertajam",xy:[16,12],ll:[5.3636,100.4667]},
};
const townName = k => (TOWNS[k]?.n || k);
function dist(a,b){ const A=TOWNS[a]?.xy,B=TOWNS[b]?.xy; if(!A||!B) return 99;
  return Math.round(Math.hypot(A[0]-B[0],A[1]-B[1])); }
function haversine(a,b){ const R=6371,dLat=(b[0]-a[0])*Math.PI/180,dLng=(b[1]-a[1])*Math.PI/180;
  const s=Math.sin(dLat/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s)); }
// distance from the current worker to a job — live GPS if available, else town grid
function distanceTo(job){ const w=me();
  if(w && w.coords && TOWNS[job.town]?.ll) return Math.max(1, Math.round(haversine(w.coords, TOWNS[job.town].ll)));
  return dist(w.town, job.town); }

function reliability(w){ const tot=w.completed+w.noshow; return tot? Math.round(w.completed/tot*100) : null; }

  if(q) jobs=jobs.filter(x=>(x.j.title+" "+catLabel(x.j.cat||"general")+" "+townName(x.j.town)+" "+E(x.j.empId).biz).toLowerCase().includes(q));
  const urgRank={today:0,tomorrow:1,normal:2};
  jobs.sort((a,b)=> (isFeatured(b.j)-isFeatured(a.j))
    || (urgRank[a.j.urg]-urgRank[b.j.urg])
    || (planRank(E(a.j.empId))-planRank(E(b.j.empId)))
    || (a.d-b.d));
  return jobs;
}

// ---- Worker: map view (no external tiles — relative pins + distance rings) ----
function workerMap(jobs){
  const w=me(), o=w.coords || TOWNS[w.town]?.ll || [5.41,100.33];
  const C=160, maxKm=12, scale=148/maxKm, cosL=Math.cos(o[0]*Math.PI/180);
  const rings=[2,5,10].map(km=>`<circle cx="${C}" cy="${C}" r="${km*scale}" class="ring"/><text x="${C}" y="${C-km*scale+12}" class="ringlbl">${km}km</text>`).join("");
  const pins=jobs.map(({j})=>{
    const jll=TOWNS[j.town]?.ll||o;
    let kx=(jll[1]-o[1])*111.32*cosL, ky=(jll[0]-o[0])*110.57;
    let km=Math.hypot(kx,ky); if(km>maxKm){ const f=maxKm/km; kx*=f; ky*=f; }
    const px=C+kx*scale, py=C-ky*scale;
    return `<g class="pin" data-act="openApply" data-id="${j.id}" transform="translate(${px.toFixed(1)},${py.toFixed(1)})">
      <circle r="15" class="pindot ${isFeatured(j)?"feat":j.urg!=="normal"?"urg":""}"/>
      <text class="pinemo" y="5" text-anchor="middle">${CATS[j.cat||"general"]||"🧰"}</text>
      <text class="pinlbl" y="30" text-anchor="middle">${esc(j.pay)}</text></g>`;
  }).join("");
  return `<div class="card mapcard"><svg viewBox="0 0 320 320" class="map">
    ${rings}
    <g transform="translate(${C},${C})"><circle r="9" class="mehere"/><text y="-14" text-anchor="middle" class="melbl">📍 ${esc(me().name)}</text></g>
    ${pins}
  </svg>${jobs.length?"":`<div class="empty" style="margin-top:10px">${S.savedOnly?t("noSaved"):t("noJobs")}</div>`}</div>`;
}

// ============ Render ============
function render(){
  document.getElementById("tagline").textContent=t("tagline");
  document.getElementById("lang").value=lang;
  // notification bell (injected into the header row, before the language picker)
  const hrow=document.querySelector(".hrow");
  if(hrow){
    let bell=document.getElementById("bell");
    if(!bell){ bell=document.createElement("button"); bell.id="bell"; bell.className="bell"; bell.dataset.act="openNotifs";
      hrow.insertBefore(bell, document.getElementById("lang")); }
    const n=unreadCount();
    bell.innerHTML=`🔔${n?`<span class="bdot">${n>9?"9+":n}</span>`:""}`;
  }
  // roles
  document.getElementById("roles").innerHTML=
    `<button data-act="role" data-v="worker" class="${S.role==="worker"?"on":""}">🔎 ${t("roleWorker")}</button>
     <button data-act="role" data-v="employer" class="${S.role==="employer"?"on":""}">📢 ${t("roleEmployer")}</button>`;
  // nav
  const tabs = S.role==="worker"
    ? [["jobs","🔥",t("w_jobs")],["apps","📨",t("w_apps")],["profile","👤",t("w_profile")]]
    : [["post","➕",t("e_post")],["jobs","📋",t("e_jobs")],["biz","🏢",t("e_biz")]];
  if(!tabs.some(x=>x[0]===S.tab)) S.tab=tabs[0][0];
  document.getElementById("nav").innerHTML=tabs.map(([k,ic,lab])=>
    `<button data-act="tab" data-v="${k}" class="${S.tab===k?"on":""}"><span class="ic">${ic}</span>${lab}</button>`).join("");
  // body
  let html="";
  if(S.role==="worker"){
    if(S.tab==="jobs") html=workerJobs();
    else if(S.tab==="apps") html=workerApps();
    else html=workerProfile();
  } else {
    if(S.tab==="post") html=employerPost();
    else if(S.tab==="jobs") html=employerJobs();
    else html=employerBiz();
  }
  const app=document.getElementById("app");
  app.innerHTML=html;
  // keep focus in the search box while typing
  if(S._sfocus){ const js=document.getElementById("jobSearch"); if(js){ js.focus(); const v=js.value; js.setSelectionRange(v.length,v.length); } S._sfocus=false; }
  // modal
  let ov=document.getElementById("ovroot"); if(ov) ov.remove();
  if(S.modal){
    const root=document.createElement("div"); root.id="ovroot";
    root.innerHTML = S.modal.type==="apply"? modalApply(S.modal.jobId)
      : S.modal.type==="notifs"? modalNotifs()
      : modalChat(S.modal.jobId,S.modal.workerId);
    document.body.appendChild(root);
    const mi=document.getElementById("msgInput"); if(mi) mi.focus();
    const mb=document.getElementById("msgs"); if(mb) mb.scrollTop=mb.scrollHeight;
  }
  // toast
  let tt=document.getElementById("toastroot"); if(tt) tt.remove();
  if(S.toast){ const r=document.createElement("div"); r.id="toastroot"; r.innerHTML=`<div class="toast">${esc(S.toast)}</div>`; document.body.appendChild(r); }
}

// ============ Events ============
document.addEventListener("click", e=>{
  const el=e.target.closest("[data-act]"); if(!el) return;
  const act=el.dataset.act, id=el.dataset.id;
  switch(act){
    case "role": S.role=el.dataset.v; S.tab=null; render(); break;
    case "tab": S.tab=el.dataset.v; render(); break;
    case "dist": S.dist=el.dataset.v; render(); break;
    case "urg": S.urgent=!S.urgent; render(); break;
    case "cat": S.cat=el.dataset.v; render(); break;
    case "jobsView": S.jobsView=el.dataset.v; render(); break;
    case "savedOnly": S.savedOnly=!S.savedOnly; render(); break;
    case "appFilter": S.appFilter=el.dataset.v; render(); break;
    case "save": { const set=savedSet(); const i=set.indexOf(id); if(i<0) set.push(id); else set.splice(i,1); save(); render(); break; }
    case "openApply": S.modal={type:"apply",jobId:id}; render(); break;
    case "closeOv": S.modal=null; render(); break;
    case "openNotifs": myNotifs().forEach(n=>n.read=true); save(); S.modal={type:"notifs"}; render(); break;
    case "useGPS":
      if(!navigator.geolocation){ toast(t("gpsFail")); break; }
      navigator.geolocation.getCurrentPosition(
        pos=>{ const w=me(); w.coords=[pos.coords.latitude,pos.coords.longitude]; save(); toast(t("gpsOn")); render(); },
        ()=>toast(t("gpsFail")), {timeout:8000});
      break;
    case "setPlan": { const e=E(S.employerId); if(e){ e.plan=el.dataset.v; save(); toast(t("upgraded")); render(); } break; }
    case "applyAlone": {
      const job=J(id); DB.apps.push({id:uid(),jobId:id,workerId:S.workerId,friendId:null,status:"applied"});
      notify("employer", job.empId, `${me().name} ${t("notiApplied")} ${job.title}`);
      save(); S.modal=null; S.tab="apps"; toast(t("appliedToast")); break; }
    case "applyFriend": {
      const job=J(id); DB.apps.push({id:uid(),jobId:id,workerId:S.workerId,friendId:el.dataset.f,status:"applied"});
      notify("employer", job.empId, `${me().name} ${t("notiApplied")} ${job.title} ${t("notiBuddy")}`);
      save(); S.modal=null; S.tab="apps"; toast(t("appliedToast")); break; }
    case "chat": S.modal={type:"chat",jobId:id,workerId:el.dataset.w}; render(); break;
    case "share": shareJob(id); break;
    case "install":
      if(deferredInstall){ deferredInstall.prompt(); deferredInstall.userChoice.finally(()=>{ deferredInstall=null; render(); }); }
      break;
    case "accept": { const a=DB.apps.find(x=>x.id===id); if(a){ const job=J(a.jobId);
        [a.workerId,a.friendId].filter(Boolean).forEach(wid=>notify("worker",wid,`${t("notiAccepted")} ${job.title}`)); }
        setStatus(id,"accepted"); break; }
    case "decline": { const a=DB.apps.find(x=>x.id===id); if(a){ const job=J(a.jobId);
        [a.workerId,a.friendId].filter(Boolean).forEach(wid=>notify("worker",wid,`${t("notiDeclined")} ${job.title}`)); }
        setStatus(id,"declined"); break; }
    case "complete": resolveJob(id,true); break;
    case "noshow": resolveJob(id,false); break;
    case "rate": { const n=e.target.dataset.n; if(n) doRate(id,Number(n)); break; }
    case "publish": publish(); break;
    case "loadDemo": if(confirm("Load demo data?")){ seed(); S.modal=null; render(); } break;
    case "clearAll": if(confirm("Clear everything?")){ DB.workers=[{id:"me",name:"You",age:24,photo:"🧑",langs:["English"],town:"georgetown",completed:0,noshow:0}]; DB.employers=[{id:"e1",biz:"My Business",verified:false,plan:"free",ratingSum:0,ratingCount:0}]; DB.jobs=[];DB.apps=[];DB.msgs=[];DB.notifs=[]; S.workerId="me"; save(); render(); } break;
  }
});
document.addEventListener("change", e=>{
  if(e.target.id==="lang"){ lang=e.target.value; localStorage.setItem("wg_lang",lang); render(); }
  if(e.target.dataset.act==="actAs"){ S.workerId=e.target.value; render(); }
});
document.addEventListener("input", e=>{
  if(e.target.id==="jobSearch"){ S.q=e.target.value; S._sfocus=true; render(); }
});
document.addEventListener("submit", e=>{
  const f=e.target.closest("[data-act='sendForm']"); if(!f) return;
  e.preventDefault();
  const input=document.getElementById("msgInput"); const text=input.value.trim(); if(!text) return;
  const jobId=f.dataset.id, wId=f.dataset.w, job=J(jobId);
  DB.msgs.push({id:uid(),jobId,workerId:wId,from:S.role,text,ts:Date.now()});
  if(S.role==="worker") notify("employer", job.empId, `${t("notiMsg")} ${job.title}`);
  else notify("worker", wId, `${t("notiMsg")} ${job.title}`);
  save(); render();
});
function setStatus(appId,status){ const a=DB.apps.find(x=>x.id===appId); if(a){a.status=status; save(); render();} }
function resolveJob(appId, showed){
  const a=DB.apps.find(x=>x.id===appId); if(!a) return;
  a.status = showed? "completed":"noshow";
  [a.workerId, a.friendId].filter(Boolean).forEach(wid=>{ const w=W(wid); if(w){ if(showed) w.completed++; else w.noshow++; } });
  save(); render();
}
function doRate(appId, n){
  const a=DB.apps.find(x=>x.id===appId); if(!a||a.rated) return;
  a.rated=n; const job=J(a.jobId); const e=E(job.empId); if(e){ e.ratingSum+=n; e.ratingCount++; }
  save(); render();
}
function publish(){
  const e=E(S.employerId);
  if(empPlan(e)==="free" && empJobs(e.id).length>=FREE_LIMIT){ toast(t("freeLimit")); return; }
  const v=id=>document.getElementById(id).value.trim();
  const title=v("p_title"); if(!title){ alert("Job title?"); return; }
  const featEl=document.getElementById("p_feat");
  const urg=document.getElementById("p_urg").value;
  const job={ id:uid(), empId:S.employerId, title, cat:document.getElementById("p_cat").value,
    town:document.getElementById("p_town").value, date:v("p_date")||"-", time:v("p_time")||"-",
    pay:v("p_pay")||"-", needed:Math.max(1,Number(v("p_needed"))||1), urg,
    featured: isPremium(e) && featEl && featEl.checked };
  DB.jobs.unshift(job);
  // urgent jobs ping all workers
  if(urg!=="normal") DB.workers.forEach(w=>notify("worker", w.id, `${t("notiUrgent")} ${title}`));
  save(); S.tab="jobs"; toast(t("postedToast"));
}

// ============ PWA + deep links ============
if(typeof window!=="undefined"){
  // installable app: capture the prompt and surface our own Install button
  window.addEventListener("beforeinstallprompt", e=>{ e.preventDefault(); deferredInstall=e; render(); });
  window.addEventListener("appinstalled", ()=>{ deferredInstall=null; toast(t("installed")); });
  // register the service worker (ignored on file:// or unsupported browsers)
  if("serviceWorker" in navigator){ window.addEventListener("load", ()=>navigator.serviceWorker.register("/sw.js").catch(()=>{})); }
  // deep link: ?job=<id> opens that job for a worker (used by shared WhatsApp links)
  try{
    const jid=new URLSearchParams(location.search).get("job");
    if(jid && J(jid)){ S.role="worker"; S.tab="jobs"; S.modal={type:"apply",jobId:jid}; }
  }catch(_){}
}

// ============ Optional cloud sync (Supabase) ============
// Active only when window.__GIG_SUPA has a url + anon key (set from env in app/page.js).
// Stores the whole app state as one JSON blob per "room" and live-syncs via realtime,
// so two phones in the same room see each other. Falls back to localStorage otherwise.
(function initCloud(){
  const cfg = (typeof window!=="undefined") && window.__GIG_SUPA;
  if(!cfg || !cfg.url || !cfg.key) return;            // not configured → local only
  const ROOM = cfg.room || "demo";
  const CLIENT = uid();
  const KEYS = ["workers","employers","jobs","apps","msgs","notifs"];
  let sb=null, pushTimer=null;
  cloudStatus = { on:true, room:ROOM };
  function applyBlob(d){
    if(!d) return;
    KEYS.forEach(k=>{ if(d[k]) DB[k]=d[k]; });
    KEYS.forEach(k=>localStorage.setItem("wg_"+k, JSON.stringify(DB[k])));
    render();
  }
  cloudPush = function(){
    if(!sb) return;
    clearTimeout(pushTimer);
    pushTimer = setTimeout(async ()=>{
      try{
        const data={ _w:CLIENT, _t:Date.now() };
        KEYS.forEach(k=>data[k]=DB[k]);
        await sb.from("gig_rooms").upsert({ id:ROOM, data, updated_at:new Date().toISOString() });
      }catch(_){}
    }, 400);
  };
  import("https://esm.sh/@supabase/supabase-js@2").then(async ({ createClient })=>{
    sb = createClient(cfg.url, cfg.key, { auth:{ persistSession:false } });
    try{
      const { data } = await sb.from("gig_rooms").select("data").eq("id",ROOM).maybeSingle();
      if(data && data.data) applyBlob(data.data);
      else cloudPush();                                // seed the room from local data
    }catch(_){}
    sb.channel("gig_"+ROOM)
      .on("postgres_changes", { event:"*", schema:"public", table:"gig_rooms", filter:"id=eq."+ROOM },
        payload=>{ const d=payload.new && payload.new.data; if(d && d._w!==CLIENT) applyBlob(d); })
      .subscribe();
    render();
  }).catch(()=>{ cloudStatus={ on:false, room:ROOM }; });
})();

render();
</script>
